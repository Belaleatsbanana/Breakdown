# .github/workflows/docs.yml
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install MkDocs
        run: uv tool install mkdocs-material

      - name: Deploy
        run: mkdocs gh-deploy --force

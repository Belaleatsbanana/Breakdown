# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/core"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/clients/vscode/extension-host"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/clients/vscode/webview"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
